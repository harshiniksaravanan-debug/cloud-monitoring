name: Trigger Health Checks

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  trigger-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron check endpoint
        run: |
          curl -s -X POST "https://backend-nine-jet-59.vercel.app/api/cron/check"
      - name: Verify monitors
        run: |
          curl -s "https://backend-nine-jet-59.vercel.app/api/monitors/dashboard"
